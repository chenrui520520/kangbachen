<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KangBa - Web3暗黑卡牌</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#0B0B0F; color:#EAEAF0; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background:#14141C; border:1px solid #252538; border-radius:16px; padding:16px; margin-bottom:16px; }
    .title { color:#B3122F; }
    .btn { background:#6B4EFF; color:white; border:0; padding:10px 14px; border-radius:10px; cursor:pointer; }
    .ok { color:#2FBF71; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">KangBa 测试大厅</h1>
    <div class="card">
      <h3>灵魂熔炉（Demo）</h3>
      <p>当前成功率：<span id="rate">50%</span></p>
      <button class="btn" id="synth">发起合成（模拟）</button>
      <p id="result"></p>
    </div>

    <div class="card">
      <h3>运行状态</h3>
      <p id="health">检测中...</p>
    </div>
  </div>

  <script>
    const rate = 0.5;
    document.getElementById('synth').onclick = () => {
      const success = Math.random() < rate;
      document.getElementById('result').innerHTML = success
        ? '<span class="ok">合成成功：T → U</span>'
        : '合成失败：幸运值 +1';
    };

    fetch('/api/health').then(r => r.json()).then(d => {
      document.getElementById('health').textContent = `API: ${d.status} | ts: ${d.ts}`;
    }).catch(() => {
      document.getElementById('health').textContent = 'API不可用（请先启动服务）';
    });
  </script>
</body>
</html>
